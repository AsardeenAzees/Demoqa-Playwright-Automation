name: DemoQA Playwright Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run DemoQA Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install --with-deps chromium

      - name: Create user.json for test credentials
        run: |
          echo '{
            "username": "${{ secrets.DEMOQA_USERNAME }}",
            "password": "${{ secrets.DEMOQA_PASSWORD }}"
          }' > user.json

      - name: Run automation tests
        run: npm run test -- --runInBand